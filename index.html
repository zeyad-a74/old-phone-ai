<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Old Phone AI">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon.png">
  <title>Old Phone AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000000;
      color: #ffffff;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
    }

    #app {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
      height: 100%;
      max-width: 700px;
      margin: 0 auto;
    }

    /* HEADER */
    #header {
      background: #000000;
      border-bottom: 1px solid #00ff88;
      padding: 10px 14px;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
    }

    #header-top {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: justify;
      -webkit-justify-content: space-between;
      justify-content: space-between;
    }

    #logo-area {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
    }

    #logo-icon {
      width: 36px;
      height: 36px;
      border: 2px solid #00ff88;
      border-radius: 6px;
      background: #000;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      margin-left: 10px;
      font-size: 18px;
    }

    #logo-text {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
    }

    #logo-name {
      color: #00ff88;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    #logo-sub {
      color: #555555;
      font-size: 10px;
      letter-spacing: 2px;
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00ff88;
    }

    #header-info {
      color: #333333;
      font-size: 10px;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* CHAT AREA */
    #chat {
      -webkit-box-flex: 1;
      -webkit-flex: 1;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      margin-bottom: 12px;
      max-width: 88%;
      word-wrap: break-word;
      word-break: break-word;
    }

    .msg-user {
      margin-right: auto;
      margin-left: 12%;
    }

    .msg-ai {
      margin-left: auto;
      margin-right: 12%;
    }

    .msg-bubble {
      padding: 10px 13px;
      border-radius: 4px;
      line-height: 1.5;
      font-size: 14px;
    }

    .msg-user .msg-bubble {
      background: #001a0f;
      border: 1px solid #00ff88;
      color: #00ff88;
      border-radius: 4px 4px 4px 0;
    }

    .msg-ai .msg-bubble {
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      color: #dddddd;
      border-radius: 4px 4px 0 4px;
    }

    .msg-label {
      font-size: 10px;
      letter-spacing: 1px;
      margin-bottom: 4px;
      color: #444444;
    }

    .msg-user .msg-label {
      text-align: right;
      color: #00aa55;
    }

    .msg-ai .msg-label {
      text-align: left;
      color: #555555;
    }

    /* TYPING INDICATOR */
    #typing {
      display: none;
      padding: 10px 13px;
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-radius: 4px;
      margin-bottom: 12px;
      width: 70px;
      margin-right: auto;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00ff88;
      margin-left: 3px;
      -webkit-animation: blink 1.2s infinite;
      animation: blink 1.2s infinite;
    }

    .dot:nth-child(2) {
      -webkit-animation-delay: 0.2s;
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      -webkit-animation-delay: 0.4s;
      animation-delay: 0.4s;
    }

    @-webkit-keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    /* INPUT AREA */
    #inputbar {
      background: #000000;
      border-top: 1px solid #111111;
      padding: 10px 12px;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
    }

    #inputrow {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: flex-end;
      -webkit-align-items: flex-end;
      align-items: flex-end;
    }

    #userinput {
      -webkit-box-flex: 1;
      -webkit-flex: 1;
      flex: 1;
      background: #0d0d0d;
      border: 1px solid #222222;
      border-radius: 4px;
      color: #ffffff;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      padding: 10px 12px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      line-height: 1.4;
      margin-left: 10px;
    }

    #userinput:focus {
      border-color: #00ff88;
    }

    #userinput::-webkit-input-placeholder {
      color: #333333;
    }

    #sendbtn {
      width: 44px;
      height: 44px;
      background: #00ff88;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
      font-size: 18px;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    #sendbtn:active {
      background: #00cc66;
    }

    #sendbtn.disabled {
      background: #1a1a1a;
      cursor: default;
    }

    #clearrow {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      margin-top: 8px;
    }

    #clearbtn {
      background: none;
      border: none;
      color: #333333;
      font-family: "Courier New", Courier, monospace;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 1px;
      padding: 4px 10px;
      -webkit-tap-highlight-color: transparent;
    }

    #clearbtn:active {
      color: #ff4444;
    }

    /* WELCOME */
    #welcome {
      text-align: center;
      padding: 40px 20px;
      color: #222222;
    }

    #welcome-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    #welcome-title {
      color: #00ff88;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    #welcome-desc {
      color: #333333;
      font-size: 12px;
      line-height: 1.7;
      letter-spacing: 1px;
    }

    #welcome-hints {
      margin-top: 24px;
    }

    .hint-item {
      background: #080808;
      border: 1px solid #111111;
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 8px;
      text-align: right;
      color: #444444;
      font-size: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .hint-item:active {
      border-color: #00ff88;
      color: #00ff88;
    }

    /* SCROLLBAR */
    #chat::-webkit-scrollbar {
      width: 3px;
    }

    #chat::-webkit-scrollbar-track {
      background: #000;
    }

    #chat::-webkit-scrollbar-thumb {
      background: #111111;
    }

    /* ERROR */
    .msg-error .msg-bubble {
      border-color: #440000;
      color: #ff4444;
    }
  </style>
</head>
<body>

<div id="app">

  <div id="header">
    <div id="header-top">
      <div id="logo-area">
        <div id="logo-icon">&#128241;</div>
        <div id="logo-text">
          <div id="logo-name">OLD PHONE</div>
          <div id="logo-sub">by Zeyad &bull; AI v3.2</div>
        </div>
      </div>
      <div id="status-dot"></div>
    </div>
    <div id="header-info">AMOLED &bull; KitKat Ready &bull; DeepSeek V3.2</div>
  </div>

  <div id="chat">
    <div id="welcome">
      <div id="welcome-icon">&#128241;</div>
      <div id="welcome-title">OLD PHONE AI</div>
      <div id="welcome-desc">
        ذكاء اصطناعي قوي مصمم للأجهزة القديمة<br>
        طورني: Zeyad
      </div>
      <div id="welcome-hints">
        <div class="hint-item" onclick="setHint('اشرح لي كيف يعمل الذكاء الاصطناعي')">اشرح لي كيف يعمل الذكاء الاصطناعي</div>
        <div class="hint-item" onclick="setHint('ساعدني في كتابة كود Python بسيط')">ساعدني في كتابة كود Python بسيط</div>
        <div class="hint-item" onclick="setHint('ما هي أفضل النصائح لتوفير شحن البطارية؟')">ما أفضل النصائح لتوفير شحن البطارية؟</div>
      </div>
    </div>
    <div id="typing">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <div id="inputbar">
    <div id="inputrow">
      <button id="sendbtn" onclick="sendMsg()">&#10148;</button>
      <textarea
        id="userinput"
        placeholder="اكتب رسالتك..."
        rows="1"
        onkeyup="handleKey(event)"
      ></textarea>
    </div>
    <div id="clearrow">
      <button id="clearbtn" onclick="clearChat()">&#9003; مسح المحادثة</button>
    </div>
  </div>

</div>

<script>
  var API_KEY = "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";
  var MODEL = "deepseek/deepseek-v3.2";
  var API_URL = "https://openrouter.ai/api/v1/chat/completions";
  var SYSTEM_PROMPT = "أنت Old Phone AI، ذكاء اصطناعي قوي ومتطور طوّره Zeyad. تم تصميمك خصيصاً للعمل على الأجهزة القديمة والضعيفة مثل Android KitKat. أنت ذكي جداً وتستغل إمكاناتك الكاملة حتى على الأجهزة المحدودة. ردودك دقيقة ومفيدة وموجزة. تحدث بالعربية إذا خاطبك المستخدم بها، وبالإنجليزية إذا خاطبك بها. لا تذكر أنك نموذج من DeepSeek - أنت Old Phone AI فقط.";

  var messages = [];
  var isLoading = false;
  var welcomeShown = true;

  function setHint(text) {
    document.getElementById("userinput").value = text;
    sendMsg();
  }

  function hideWelcome() {
    var w = document.getElementById("welcome");
    if (w && welcomeShown) {
      w.style.display = "none";
      welcomeShown = false;
    }
  }

  function handleKey(e) {
    var ta = document.getElementById("userinput");
    ta.style.height = "auto";
    ta.style.height = (ta.scrollHeight > 120 ? 120 : ta.scrollHeight) + "px";
  }

  function scrollDown() {
    var chat = document.getElementById("chat");
    chat.scrollTop = chat.scrollHeight;
  }

  function addMsg(role, text, isError) {
    hideWelcome();
    var chat = document.getElementById("chat");
    var typing = document.getElementById("typing");

    var div = document.createElement("div");
    div.className = "msg " + (role === "user" ? "msg-user" : "msg-ai") + (isError ? " msg-error" : "");

    var label = document.createElement("div");
    label.className = "msg-label";
    label.innerHTML = role === "user" ? "أنت" : "OLD PHONE AI";

    var bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.innerHTML = escapeHtml(text).replace(/\n/g, "<br>");

    div.appendChild(label);
    div.appendChild(bubble);

    chat.insertBefore(div, typing);
    scrollDown();
    return div;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function showTyping(show) {
    var t = document.getElementById("typing");
    t.style.display = show ? "block" : "none";
    if (show) scrollDown();
  }

  function setBtnState(loading) {
    var btn = document.getElementById("sendbtn");
    isLoading = loading;
    if (loading) {
      btn.className = "disabled";
      btn.innerHTML = "&#9203;";
    } else {
      btn.className = "";
      btn.innerHTML = "&#10148;";
    }
  }

  function sendMsg() {
    if (isLoading) return;

    var ta = document.getElementById("userinput");
    var text = ta.value.replace(/^\s+|\s+$/g, "");
    if (!text) return;

    ta.value = "";
    ta.style.height = "auto";

    addMsg("user", text, false);

    messages.push({ role: "user", content: text });
    if (messages.length > 20) {
      messages = messages.slice(messages.length - 20);
    }

    setBtnState(true);
    showTyping(true);

    var payload = JSON.stringify({
      model: MODEL,
      max_tokens: 1000,
      messages: [{ role: "system", content: SYSTEM_PROMPT }].concat(messages)
    });

    var xhr = new XMLHttpRequest();
    xhr.open("POST", API_URL, true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.setRequestHeader("Authorization", "Bearer " + API_KEY);
    xhr.setRequestHeader("HTTP-Referer", "https://oldphone.ai");
    xhr.setRequestHeader("X-Title", "Old Phone AI");

    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      showTyping(false);
      setBtnState(false);

      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          var reply = data.choices[0].message.content;
          messages.push({ role: "assistant", content: reply });
          addMsg("ai", reply, false);
        } catch (e) {
          addMsg("ai", "خطأ في معالجة الرد. حاول مجدداً.", true);
        }
      } else {
        var errMsg = "خطأ في الاتصال (" + xhr.status + "). تحقق من الإنترنت.";
        try {
          var errData = JSON.parse(xhr.responseText);
          if (errData.error && errData.error.message) {
            errMsg = errData.error.message;
          }
        } catch (e2) {}
        addMsg("ai", errMsg, true);
      }
    };

    xhr.onerror = function() {
      showTyping(false);
      setBtnState(false);
      addMsg("ai", "تعذر الاتصال. تحقق من اتصالك بالإنترنت.", true);
    };

    xhr.send(payload);
  }

  function clearChat() {
    messages = [];
    var chat = document.getElementById("chat");
    var typing = document.getElementById("typing");

    while (chat.firstChild && chat.firstChild !== typing) {
      chat.removeChild(chat.firstChild);
    }

    if (!welcomeShown) {
      var w = document.createElement("div");
      w.id = "welcome";
      w.innerHTML = '<div id="welcome-icon">&#128241;</div>' +
        '<div id="welcome-title">OLD PHONE AI</div>' +
        '<div id="welcome-desc">ذكاء اصطناعي قوي مصمم للأجهزة القديمة<br>طورني: Zeyad</div>' +
        '<div id="welcome-hints">' +
          '<div class="hint-item" onclick="setHint(\'اشرح لي كيف يعمل الذكاء الاصطناعي\')">اشرح لي كيف يعمل الذكاء الاصطناعي</div>' +
          '<div class="hint-item" onclick="setHint(\'ساعدني في كتابة كود Python بسيط\')">ساعدني في كتابة كود Python بسيط</div>' +
          '<div class="hint-item" onclick="setHint(\'ما هي أفضل النصائح لتوفير شحن البطارية؟\')">ما أفضل النصائح لتوفير شحن البطارية؟</div>' +
        '</div>';
      chat.insertBefore(w, typing);
      welcomeShown = true;
    }
  }
</script>

</body>
</html>
