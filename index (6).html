<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Old Phone AI">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon.png">
  <title>Old Phone AI</title>
  <style>
    * {
      margin: 0; padding: 0;
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      height: 100%; overflow: hidden;
      background: #000; color: #fff;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
    }
    #app {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-orient: vertical; -webkit-box-direction: normal;
      -webkit-flex-direction: column; flex-direction: column;
      height: 100%; max-width: 700px; margin: 0 auto;
    }
    #header {
      background: #000; border-bottom: 1px solid #00ff88;
      padding: 10px 14px; -webkit-flex-shrink: 0; flex-shrink: 0;
    }
    #header-top {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
      -webkit-box-pack: justify; -webkit-justify-content: space-between; justify-content: space-between;
    }
    #logo-area {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
    }
    #logo-icon {
      width: 36px; height: 36px; border: 2px solid #00ff88;
      border-radius: 6px; background: #000; margin-left: 10px;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
      -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
      font-size: 18px;
    }
    #logo-name { color: #00ff88; font-size: 16px; font-weight: bold; letter-spacing: 1px; }
    #logo-sub { color: #555; font-size: 10px; letter-spacing: 2px; }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; }
    #header-info { color: #333; font-size: 10px; margin-top: 6px; letter-spacing: 1px; }

    #chat {
      -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
      overflow-y: auto; overflow-x: hidden;
      padding: 12px; -webkit-overflow-scrolling: touch;
    }
    .msg { margin-bottom: 12px; max-width: 88%; word-wrap: break-word; word-break: break-word; }
    .msg-user { margin-right: auto; margin-left: 12%; }
    .msg-ai   { margin-left: auto;  margin-right: 12%; }
    .msg-bubble { padding: 10px 13px; border-radius: 4px; line-height: 1.5; font-size: 14px; }
    .msg-user .msg-bubble { background: #001a0f; border: 1px solid #00ff88; color: #00ff88; border-radius: 4px 4px 4px 0; }
    .msg-ai   .msg-bubble { background: #0a0a0a; border: 1px solid #1a1a1a; color: #ddd;     border-radius: 4px 4px 0 4px; }
    .msg-error .msg-bubble { background: #0a0000; border-color: #440000; color: #ff5555; }
    .msg-label { font-size: 10px; letter-spacing: 1px; margin-bottom: 4px; color: #444; }
    .msg-user .msg-label { text-align: right; color: #00aa55; }
    .msg-ai   .msg-label { text-align: left;  color: #555; }

    #typing {
      display: none; padding: 10px 13px;
      background: #0a0a0a; border: 1px solid #1a1a1a;
      border-radius: 4px; margin-bottom: 12px;
      width: 70px; margin-right: auto;
    }
    .dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: #00ff88; margin-left: 3px;
      -webkit-animation: blink 1.2s infinite; animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { -webkit-animation-delay:.2s; animation-delay:.2s; }
    .dot:nth-child(3) { -webkit-animation-delay:.4s; animation-delay:.4s; }
    @-webkit-keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
    @keyframes         blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    #inputbar {
      background: #000; border-top: 1px solid #111;
      padding: 10px 12px; -webkit-flex-shrink: 0; flex-shrink: 0;
    }
    #inputrow {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-align: flex-end; -webkit-align-items: flex-end; align-items: flex-end;
    }
    #userinput {
      -webkit-box-flex: 1; -webkit-flex: 1; flex: 1;
      background: #0d0d0d; border: 1px solid #222; border-radius: 4px;
      color: #fff; font-family: "Courier New", Courier, monospace;
      font-size: 14px; padding: 10px 12px; resize: none; outline: none;
      min-height: 44px; max-height: 120px; overflow-y: auto;
      -webkit-overflow-scrolling: touch; line-height: 1.4; margin-left: 10px;
    }
    #userinput:focus { border-color: #00ff88; }
    #userinput::-webkit-input-placeholder { color: #333; }
    #sendbtn {
      width: 44px; height: 44px; background: #00ff88;
      border: none; border-radius: 4px; cursor: pointer;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
      -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
      -webkit-flex-shrink: 0; flex-shrink: 0;
      font-size: 20px; color: #000; font-weight: bold;
    }
    #sendbtn:active { background: #00cc66; }
    #sendbtn.disabled { background: #1a1a1a; color: #333; }

    #clearrow {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
      margin-top: 8px;
    }
    #clearbtn {
      background: none; border: none; color: #333;
      font-family: "Courier New", Courier, monospace;
      font-size: 11px; cursor: pointer; letter-spacing: 1px; padding: 4px 10px;
    }
    #clearbtn:active { color: #ff4444; }

    #welcome { text-align: center; padding: 40px 20px; }
    #welcome-icon { font-size: 48px; margin-bottom: 16px; }
    #welcome-title { color: #00ff88; font-size: 20px; font-weight: bold; letter-spacing: 2px; margin-bottom: 8px; }
    #welcome-desc  { color: #333; font-size: 12px; line-height: 1.7; letter-spacing: 1px; margin-bottom: 24px; }
    .hint-item {
      background: #080808; border: 1px solid #111; border-radius: 4px;
      padding: 10px 14px; margin-bottom: 8px;
      text-align: right; color: #444; font-size: 12px; cursor: pointer;
    }
    .hint-item:active { border-color: #00ff88; color: #00ff88; }

    #chat::-webkit-scrollbar       { width: 3px; }
    #chat::-webkit-scrollbar-track { background: #000; }
    #chat::-webkit-scrollbar-thumb { background: #111; }
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="header-top">
      <div id="logo-area">
        <div id="logo-icon">&#128241;</div>
        <div>
          <div id="logo-name">OLD PHONE</div>
          <div id="logo-sub">by Zeyad &bull; AI v3.2</div>
        </div>
      </div>
      <div id="status-dot"></div>
    </div>
    <div id="header-info">AMOLED &bull; KitKat Ready &bull; DeepSeek V3.2</div>
  </div>

  <div id="chat">
    <div id="welcome">
      <div id="welcome-icon">&#128241;</div>
      <div id="welcome-title">OLD PHONE AI</div>
      <div id="welcome-desc">ذكاء اصطناعي قوي مصمم للأجهزة القديمة<br>طوّره: Zeyad</div>
      <div>
        <div class="hint-item" onclick="setHint('اشرح لي كيف يعمل الذكاء الاصطناعي')">اشرح لي كيف يعمل الذكاء الاصطناعي</div>
        <div class="hint-item" onclick="setHint('ساعدني في كتابة كود Python بسيط')">ساعدني في كتابة كود Python بسيط</div>
        <div class="hint-item" onclick="setHint('ما أفضل النصائح لتوفير شحن البطارية؟')">ما أفضل النصائح لتوفير شحن البطارية؟</div>
      </div>
    </div>
    <div id="typing">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </div>

  <div id="inputbar">
    <div id="inputrow">
      <button id="sendbtn" onclick="sendMsg()">&#9658;</button>
      <textarea id="userinput" placeholder="اكتب رسالتك..." rows="1" onkeyup="autoGrow(this)"></textarea>
    </div>
    <div id="clearrow">
      <button id="clearbtn" onclick="clearChat()">&#10006; مسح</button>
    </div>
  </div>

</div>
<script>
var KEY   = "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";
var MODEL = "deepseek/deepseek-v3.2";
var URL_  = "https://openrouter.ai/api/v1/chat/completions";
var SYS   = "You are Old Phone AI, a very smart AI assistant created by Zeyad. You are designed to work perfectly on old and weak devices like Android 4.4 KitKat. You are highly intelligent and give accurate, helpful, concise answers. Respond in Arabic when the user writes in Arabic, and in English when they write in English. Never say you are DeepSeek - you are Old Phone AI only.";

var msgs = [];
var busy = false;
var shown = true;

function autoGrow(el) {
  el.style.height = "auto";
  el.style.height = (el.scrollHeight > 120 ? 120 : el.scrollHeight) + "px";
}

function scrollBot() {
  var c = document.getElementById("chat");
  c.scrollTop = c.scrollHeight;
}

function hideWelcome() {
  if (shown) {
    var w = document.getElementById("welcome");
    if (w) { w.style.display = "none"; }
    shown = false;
  }
}

function showTyping(v) {
  document.getElementById("typing").style.display = v ? "block" : "none";
  if (v) { scrollBot(); }
}

function setBusy(v) {
  busy = v;
  var b = document.getElementById("sendbtn");
  b.className = v ? "disabled" : "";
  b.innerHTML = v ? "&#8987;" : "&#9658;";
}

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

function addBubble(role, text, isErr) {
  hideWelcome();
  var chat = document.getElementById("chat");
  var typing = document.getElementById("typing");

  var d = document.createElement("div");
  d.className = "msg " + (role === "user" ? "msg-user" : "msg-ai") + (isErr ? " msg-error" : "");

  var lbl = document.createElement("div");
  lbl.className = "msg-label";
  lbl.innerHTML = role === "user" ? "&#9654; أنت" : "&#9670; OLD PHONE AI";

  var bub = document.createElement("div");
  bub.className = "msg-bubble";
  bub.innerHTML = esc(text).replace(/\n/g, "<br>");

  d.appendChild(lbl);
  d.appendChild(bub);
  chat.insertBefore(d, typing);
  scrollBot();
}

function setHint(t) {
  document.getElementById("userinput").value = t;
  sendMsg();
}

function sendMsg() {
  if (busy) { return; }
  var ta = document.getElementById("userinput");
  var text = ta.value.replace(/^\s+|\s+$/g, "");
  if (!text) { return; }

  ta.value = "";
  ta.style.height = "auto";

  addBubble("user", text, false);
  msgs.push({ role: "user", content: text });
  if (msgs.length > 20) { msgs = msgs.slice(msgs.length - 20); }

  setBusy(true);
  showTyping(true);

  var payload = JSON.stringify({
    model: MODEL,
    max_tokens: 1000,
    messages: [{ role: "system", content: SYS }].concat(msgs)
  });

  var xhr = new XMLHttpRequest();
  xhr.open("POST", URL_, true);
  xhr.setRequestHeader("Content-Type", "application/json");
  xhr.setRequestHeader("Authorization", "Bearer " + KEY);
  xhr.timeout = 40000;

  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) { return; }
    showTyping(false);
    setBusy(false);

    if (xhr.status === 200) {
      try {
        var data = JSON.parse(xhr.responseText);
        var reply = data.choices[0].message.content;
        msgs.push({ role: "assistant", content: reply });
        addBubble("ai", reply, false);
      } catch (e) {
        addBubble("ai", "parse error: " + e.message + "\n" + xhr.responseText.substring(0, 200), true);
      }
    } else {
      var err = "HTTP " + xhr.status;
      try {
        var j = JSON.parse(xhr.responseText);
        if (j.error && j.error.message) { err += ": " + j.error.message; }
        else { err += "\n" + xhr.responseText.substring(0, 250); }
      } catch(e2) {
        err += "\n" + xhr.responseText.substring(0, 250);
      }
      addBubble("ai", err, true);
    }
  };

  xhr.ontimeout = function() {
    showTyping(false); setBusy(false);
    addBubble("ai", "انتهت المهلة (40s). الخادم بطيء، حاول مجدداً.", true);
  };

  xhr.onerror = function() {
    showTyping(false); setBusy(false);
    addBubble("ai", "خطأ في الشبكة - تحقق من الإنترنت.", true);
  };

  xhr.send(payload);
}

function clearChat() {
  msgs = []; shown = false;
  var chat = document.getElementById("chat");
  var typing = document.getElementById("typing");
  while (chat.firstChild && chat.firstChild !== typing) {
    chat.removeChild(chat.firstChild);
  }
  var w = document.createElement("div");
  w.id = "welcome";
  w.innerHTML =
    '<div id="welcome-icon">&#128241;</div>' +
    '<div id="welcome-title">OLD PHONE AI</div>' +
    '<div id="welcome-desc">ذكاء اصطناعي قوي مصمم للأجهزة القديمة<br>طوّره: Zeyad</div>' +
    '<div>' +
    '<div class="hint-item" onclick="setHint(\'اشرح لي كيف يعمل الذكاء الاصطناعي\')">اشرح لي كيف يعمل الذكاء الاصطناعي</div>' +
    '<div class="hint-item" onclick="setHint(\'ساعدني في كتابة كود Python بسيط\')">ساعدني في كتابة كود Python بسيط</div>' +
    '<div class="hint-item" onclick="setHint(\'ما أفضل النصائح لتوفير شحن البطارية؟\')">ما أفضل النصائح لتوفير شحن البطارية؟</div>' +
    '</div>';
  chat.insertBefore(w, typing);
  shown = true;
}
</script>
</body>
</html>
